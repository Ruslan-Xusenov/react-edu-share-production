# ================================================================
# Nginx Security Configuration for EduShare
# Haqiqiy hujumlardan himoya: DDoS, XSS, SQLi, Clickjacking
# ================================================================

# --- Rate Limiting Zones ---
# DDoS va brute-force hujumlardan himoya
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=ai_chat:10m rate=10r/m;

# Connection limit — bitta IP dan max ulanishlar
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Bot/Crawler detection — juda katta request body bloklash
client_body_buffer_size 16k;

upstream edushare_app {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

# --- HTTP -> HTTPS Redirect ---
server {
    listen 80;
    server_name edushare.uz www.edushare.uz;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    server_name edushare.uz www.edushare.uz;

    # --- SSL Configuration ---
    ssl_certificate /etc/letsencrypt/live/edushare.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edushare.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # --- OCSP Stapling (SSL tezligi va xavfsizligi) ---
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Global Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Request Size Limits ---
    client_max_body_size 100M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # --- Connection Limit ---
    limit_conn conn_limit 50;

    # --- Block Suspicious User-Agents ---
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|ZmEu|paros|w3af|acunetix|nessus|havij|appscan)) {
        return 403;
    }

    # --- Block Suspicious Query Strings ---
    if ($query_string ~* "(union|select|insert|update|delete|drop|exec|xp_cmdshell|/etc/passwd|\.\./)") {
        return 403;
    }

    # --- Block common attack paths ---
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|\.svn|\.htaccess|\.htpasswd|wp-admin|wp-login|phpmyadmin|\.sql|\.bak|\.swp) {
        return 404;
    }

    # --- Static files (cached, no proxy) ---
    location /static/ {
        alias /home/react-edu-share-production/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        
        # Gzip compression
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
    }

    # --- Media files ---
    location /media/ {
        alias /home/react-edu-share-production/media/;
        add_header Accept-Ranges bytes;
        add_header X-Content-Type-Options "nosniff" always;

        # Explicit MIME types
        types {
            video/mp4 mp4;
            video/webm webm;
            video/ogg ogg;
            video/quicktime mov;
            image/jpeg jpg jpeg;
            image/png png;
            image/svg+xml svg;
            image/webp webp;
        }

        expires 30d;
        access_log off;

        # Block executable files from media
        location ~* \.(php|py|sh|bash|exe|bat|cmd)$ {
            return 403;
        }
    }

    # --- Login/Signup endpoints (strict rate limiting) ---
    location ~ ^/api/accounts/(login|signup)/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- AI Chat endpoint (rate limited) ---
    location = /api/ai-chat/ {
        limit_req zone=ai_chat burst=5 nodelay;
        limit_req_status 429;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # --- API endpoints (moderate rate limiting) ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- Admin panel ---
    location ~ ^/(admin|accounts) {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- Main application (React SPA) ---
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- SEO files ---
    location = /robots.txt { proxy_pass http://edushare_app; }
    location = /sitemap.xml { proxy_pass http://edushare_app; }

    # --- Error pages ---
    error_page 429 /429.html;
    location = /429.html {
        internal;
        return 429 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>429</title></head><body><h1>Juda ko`p so`rov</h1><p>Iltimos, biroz kutib turing va qaytadan urinib ko`ring.</p></body></html>';
    }
}