# Nginx configuration for EduShare
# File: /etc/nginx/sites-available/edushare

# Upstream Gunicorn
upstream edushare_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name edushare.uz www.edushare.uz;
    location / { return 301 https://$server_name$request_uri; }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name edushare.uz www.edushare.uz;

    ssl_certificate /etc/letsencrypt/live/edushare.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edushare.uz/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Static files - Pointing to Django staticfiles
    location /static/ {
        alias /home/react-edu-share-production/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /home/react-edu-share-production/media/;
        expires 30d;
    }

    # Video seek/decode support
    location ~* \.(mp4|webm|ogg|ogv)$ {
        root /home/react-edu-share-production;
        add_header Accept-Ranges bytes;
        expires 30d;
    }

    # Robots & Sitemap
    location = /robots.txt { proxy_pass http://edushare_app; }
    location = /sitemap.xml { proxy_pass http://edushare_app; }

    # Main application (Proxy to Gunicorn)
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://edushare_app;
        
        # Prevent HTML caching to avoid Black Screen after update
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}